spring:
  application:
    name: prodoc-api
  
  # Database configuration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://postgres-prodoc:5432/openprodoc}
    username: ${DATABASE_USER:prodoc}
    password: ${DATABASE_PASSWORD:prodoc123}
    driver-class-name: org.postgresql.Driver
    
    # HikariCP configuration
    hikari:
      maximum-pool-size: ${DATABASE_MAX_POOL_SIZE:10}
      minimum-idle: ${DATABASE_MIN_IDLE:2}
      connection-timeout: ${DATABASE_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DATABASE_IDLE_TIMEOUT:600000}
      max-lifetime: ${DATABASE_MAX_LIFETIME:1800000}
      pool-name: ProdocHikariPool
  
  # Flyway migration
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    db:
      enabled: true

# Logging
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    org.openprodoc: INFO
    com.zaxxer.hikari: INFO