version: '3.8'

services:
  # ============================================
  # PostgreSQL Database (OpenProdoc data)
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: openprodoc-postgres
    environment:
      POSTGRES_DB: prodoc
      POSTGRES_USER: user1
      POSTGRES_PASSWORD: pass1
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
      # Performance tuning (matching helm postgresql chart)
      POSTGRES_HOST_AUTH_METHOD: md5
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=1GB
      - -c
      - effective_cache_size=3GB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - wal_buffers=16MB
      - -c
      - default_statistics_target=100
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - work_mem=5242kB
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - openprodoc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user1 -d prodoc"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # OpenProdoc Core Engine (Backend + Web UI)
  # Accessible at http://localhost:8081/ProdocWeb2/
  # ============================================
  core-engine:
    image: openprodoc/core-engine:latest
    container_name: openprodoc-core
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: prodoc
      DB_USER: user1
      DB_PASSWORD: pass1
      DB_JDBC_CLASS: org.postgresql.Driver
      DB_JDBC_URL_TEMPLATE: "jdbc:postgresql://{HOST}:{PORT}/{DATABASE}?autoCommit=false"
      JDBC_DRIVER_PATH: ./lib/postgresql-42.3.8.jar
      INSTALL_ON_STARTUP: "true"
      ROOT_PASSWORD: admin
      DEFAULT_LANG: EN
      TIMESTAMP_FORMAT: "dd/MM/yyyy HH:mm:ss"
      DATE_FORMAT: "dd/MM/yyyy"
      MAIN_KEY: "uthfytnbh84kflh06fhru"
      REPO_NAME: Reposit
      REPO_ENCRYPT: "False"
      REPO_URL: /storage/OPD/
      REPO_TYPE: FS
    volumes:
      - openprodoc-storage:/storage/OPD
    ports:
      - "8081:8080"
    networks:
      - openprodoc-network
    restart: unless-stopped

  # ============================================
  # pgvector - Vector Database for RAG
  # ============================================
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: openprodoc-pgvector
    environment:
      POSTGRES_DB: rag_vectors
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgvector-data:/var/lib/postgresql/data
      - ./init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql:ro
    networks:
      - openprodoc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag_vectors"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # Ollama - LLM and Embedding Engine
  # ============================================
  ollama:
    image: ollama/ollama:0.5.4
    container_name: openprodoc-ollama
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_KEEP_ALIVE: "24h"
      OLLAMA_NUM_PARALLEL: "4"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - openprodoc-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ============================================
  # Ollama Model Puller (one-shot init container)
  # Pulls required models then exits
  # ============================================
  ollama-pull-models:
    image: curlimages/curl:latest
    container_name: openprodoc-model-puller
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - openprodoc-network
    entrypoint:
      - sh
      - -c
      - |
        echo "Waiting for Ollama API..."
        until curl -sf http://ollama:11434/ >/dev/null 2>&1; do
          sleep 2
        done

        echo "Pulling LLM model: llama3.1:latest"
        curl -sf http://ollama:11434/api/pull -d '{"name":"llama3.1:latest"}' | head -1

        echo "Pulling embedding model: nomic-embed-text:latest"
        curl -sf http://ollama:11434/api/pull -d '{"name":"nomic-embed-text:latest"}' | head -1

        echo "Models pulled successfully!"
    restart: "no"

  # ============================================
  # Open WebUI - RAG Interface
  # Accessible at http://localhost:8080
  # ============================================
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openprodoc-openwebui
    depends_on:
      ollama:
        condition: service_healthy
      pgvector:
        condition: service_healthy
    environment:
      # Ollama connection
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_API_BASE_URL: "http://ollama:11434"
      # Vector database
      VECTOR_DB: "pgvector"
      PGVECTOR_DB_URL: "postgresql://rag_user:rag_password@pgvector:5432/rag_vectors"
      # RAG configuration
      RAG_EMBEDDING_MODEL: "nomic-embed-text:latest"
      RAG_EMBEDDING_ENGINE: "ollama"
      USE_EMBEDDING_MODEL_DOCKER: ""
      CHUNK_SIZE: "1500"
      CHUNK_OVERLAP: "100"
      # WebUI settings
      WEBUI_NAME: "OpenProdoc RAG Assistant"
      WEBUI_SECRET_KEY: "openprodoc-secret-key-change-in-production"
      ENABLE_RAG_WEB_SEARCH: "false"
      ENABLE_IMAGE_GENERATION: "false"
      # Signup/user config (allow watcher to register as admin)
      ENABLE_SIGNUP: "true"
      DEFAULT_USER_ROLE: "admin"
      # SCIM for group management
      SCIM_ENABLED: "true"
      SCIM_TOKEN: "openprodoc-scim-token-change-in-production"
    volumes:
      - openwebui-data:/app/backend/data
      - openprodoc-storage:/watch/OPD:ro
    ports:
      - "8080:8080"
    networks:
      - openprodoc-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ============================================
  # RAG Watcher - Syncs OpenProdoc docs/users/groups to OpenWebUI
  # ============================================
  watcher:
    image: openprodoc/openprodoc_rag:1.0.1
    container_name: openprodoc-watcher
    depends_on:
      openwebui:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      WATCH_PATH: "/watch/OPD"
      OPENWEBUI_URL: "http://openwebui:8080"
      OPENWEBUI_EMAIL: "watcher@openprodoc.local"
      OPENWEBUI_PASSWORD: "12345678"
      POLL_INTERVAL: "30"
      # Knowledge Base strategy
      KB_STRATEGY: "folder"
      KB_FOLDER_LEVEL: "1"
      ENRICH_FILENAME: "true"
      # User sync
      SYNC_USERS: "true"
      USER_SYNC_INTERVAL: "30"
      DEFAULT_USER_PASSWORD: "OpenProdoc2025!"
      # Group sync
      SYNC_GROUPS: "true"
      GROUP_SYNC_INTERVAL: "60"
      SCIM_API_TOKEN: "openprodoc-scim-token-change-in-production"
      # OpenProdoc database connection
      OPENPRODOC_DB_HOST: "postgres"
      OPENPRODOC_DB_PORT: "5432"
      OPENPRODOC_DB_NAME: "prodoc"
      OPENPRODOC_DB_USER: "user1"
      OPENPRODOC_DB_PASSWORD: "pass1"
    volumes:
      - openwebui-data:/app/backend/data
      - openprodoc-storage:/watch/OPD:ro
      - watcher-state:/state
    networks:
      - openprodoc-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  openprodoc-storage:
    driver: local
  pgvector-data:
    driver: local
  ollama-data:
    driver: local
  openwebui-data:
    driver: local
  watcher-state:
    driver: local

networks:
  openprodoc-network:
    driver: bridge
