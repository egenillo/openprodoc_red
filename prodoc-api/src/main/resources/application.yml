spring:
  application:
    name: openprodoc-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  
  # Actuator configuration
  management:
    endpoints:
      web:
        exposure:
          include: health,info,metrics,prometheus
        base-path: /actuator
    endpoint:
      health:
        show-details: always
        probes:
          enabled: true
    metrics:
      export:
        prometheus:
          enabled: true
      tags:
        application: ${spring.application.name}
        environment: ${spring.profiles.active}
  
  # Security
  security:
    user:
      name: ${ADMIN_USER:admin}
      password: ${ADMIN_PASSWORD:admin}

# Server configuration
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  error:
    include-message: always
    include-stacktrace: on_param

# OpenProdoc Configuration
openprodoc:
  database:
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    url: ${DB_URL:jdbc:postgresql://localhost:5432/openprodoc}
    username: ${DB_USERNAME:openprodoc}
    password: ${DB_PASSWORD:openprodoc}
    max-pool-size: ${DB_MAX_POOL_SIZE:10}
    min-idle: ${DB_MIN_IDLE:2}
    connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
    idle-timeout: ${DB_IDLE_TIMEOUT:600000}
    max-lifetime: ${DB_MAX_LIFETIME:1800000}
  
  storage:
    type: ${STORAGE_TYPE:FILESYSTEM}
    path: ${STORAGE_PATH:/var/openprodoc/documents}
    s3-bucket: ${S3_BUCKET:}
    s3-region: ${S3_REGION:us-east-1}
  
  security:
    auth-type: ${AUTH_TYPE:OPD}
    session-timeout: ${SESSION_TIMEOUT:3600}
    jwt-secret: ${JWT_SECRET:your-secret-key-change-in-production}
  
  fulltext:
    engine: ${FULLTEXT_ENGINE:LUCENE}
    index-path: ${FULLTEXT_INDEX_PATH:/var/openprodoc/lucene}

# Flyway configuration
spring.flyway:
  enabled: ${FLYWAY_ENABLED:true}
  baseline-on-migrate: true
  locations: classpath:db/migration
  validate-on-migrate: true

# Logging configuration
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    org.openprodoc: ${LOG_LEVEL_APP:INFO}
    prodoc: ${LOG_LEVEL_PRODOC:INFO}
    org.springframework: ${LOG_LEVEL_SPRING:INFO}
    org.springframework.web: ${LOG_LEVEL_WEB:INFO}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# OpenAPI Documentation
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    try-it-out-enabled: true
  show-actuator: true