# OpenProdoc Production Helm Chart Values
# This file contains production-ready configuration for OpenProdoc ECM deployment

# Global settings
global:
  # Image pull policy for all containers
  imagePullPolicy: IfNotPresent
  # Image pull secrets (if using private registry)
  imagePullSecrets: []
  # - name: regcred

# Core Engine Configuration (Backend)
coreEngine:
  # Replica count
  # Number of core-engine instances to run
  # Default: 2 for high availability
  # Note: With sessionAffinity enabled, multiple replicas are supported
  replicaCount: 2

  # Image configuration
  image:
    registry: ""  # Leave empty for local registry or specify your registry
    repository: openprodoc/core-engine
    tag: "latest"  # Change to specific version tag in production
    pullPolicy: IfNotPresent

  # Service configuration
  service:
    type: ClusterIP
    port: 8080
    annotations: {}
    # Session affinity configuration
    # Enable sticky sessions by client IP to maintain session state
    sessionAffinity:
      enabled: true
      timeoutSeconds: 10800  # 3 hours

  # Resource limits and requests
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 2Gi

  # Environment configuration
  config:
    # Database configuration (uses external PostgreSQL)
    database:
      type: postgresql
      host: openprodoc-postgresql
      port: 5432
      name: prodoc
      user: user1
      password: pass1
      jdbcClass: org.postgresql.Driver
      jdbcUrlTemplate: "jdbc:postgresql://{HOST}:{PORT}/{DATABASE}?autoCommit=false"
      jdbcDriverPath: "./lib/postgresql-42.3.8.jar"

    # OpenProdoc installation settings
    install:
      enabled: true  # Auto-install on first run
      rootPassword: "admin"  # OpenProdoc admin password
      defaultLang: "EN"
      timestampFormat: "dd/MM/yyyy HH:mm:ss"
      dateFormat: "dd/MM/yyyy"
      mainKey: "uthfytnbh84kflh06fhru"  # Encryption key for documents

    # Task scheduler configuration (enables cron/event CustomTasks)
    taskScheduler:
      category: "*"
      searchFreq: "60000"
      execFreq: "30000"

    # Repository configuration
    repository:
      name: "Reposit"
      encrypt: "False"
      url: "/storage/OPD/"
      user: ""
      password: ""
      type: "FS"
      param: ""

  # Persistence for document storage
  persistence:
    enabled: true
    storageClass: ""  # Use default storage class or specify
    accessModes:
      - ReadWriteOnce
    size: 100Gi  # Adjust based on expected document volume
    annotations: {}
    mountPath: /storage/OPD

  # Pod configuration
  podAnnotations: {}
  podSecurityContext:
    fsGroup: 1000
    runAsNonRoot: true
    runAsUser: 1000

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false

  # Liveness and readiness probes
  livenessProbe:
    enabled: false  # core-engine runs as background process

  readinessProbe:
    enabled: false

  # Node selector
  nodeSelector: {}

  # Tolerations
  tolerations: []

  # Affinity
  affinity: {}



# Ingress Configuration
ingress:
  enabled: false
  className: traefik  # Using Traefik (k3d default)
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # Uncomment for HTTPS:
    # traefik.ingress.kubernetes.io/router.entrypoints: websecure

  hosts:
    - host: localhost  # For local k3d access
      paths:
        # RAG Interface (Open WebUI) - prioritize this route
        - path: /rag
          pathType: Prefix
          backend:
            service:
              name: openwebui  # Component name (will be prefixed with release name)
              port:
                number: 8080
        # Core OpenProdoc application
        - path: /
          pathType: Prefix
          backend:
            service:
              name: core-engine  # Component name (will be prefixed with release name)
              port:
                number: 8080

  tls: []  # Disabled for local development


# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: "prodoc"


# ========================================
# RAG Solution Components
# ========================================

# Vector Database (PostgreSQL with pgvector)
pgvector:
  enabled: true
  replicaCount: 1

  image:
    registry: ""
    repository: pgvector/pgvector
    tag: "pg16"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 5432

  config:
    database: rag_vectors
    user: rag_user
    password: rag_password

  persistence:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 20Gi

  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 512Mi

  podAnnotations: {}
  podSecurityContext:
    fsGroup: 999
    runAsNonRoot: true
    runAsUser: 999

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false


# Ollama - LLM and Embedding Engine
ollama:
  enabled: true
  replicaCount: 1

  image:
    registry: ""
    repository: ollama/ollama
    tag: "0.5.4"  # Updated to recent version with /api/embed support
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 11434

  config:
    # Models to pull on startup
    models:
      llm: "llama3.1:latest"  # or "phi3" for smaller/faster option
      embedding: "nomic-embed-text:latest"  # Lightweight embedding model for CPU

  persistence:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 50Gi  # Models require significant storage

  resources:
    limits:
      cpu: 8
      memory: 8Gi
    requests:
      cpu: 4
      memory: 4Gi

  podAnnotations: {}
  podSecurityContext:
    fsGroup: 0  # root group for /root/.ollama access
    # Ollama container needs root access for model storage
    # runAsNonRoot: false
    # runAsUser: 0

  securityContext:
    # Ollama requires root access for /.ollama directory
    # allowPrivilegeEscalation: false
    # capabilities:
    #   drop:
    #     - ALL
    readOnlyRootFilesystem: false


# Open WebUI - RAG Interface and Orchestrator
openwebui:
  enabled: true
  replicaCount: 1

  image:
    registry: ghcr.io
    repository: open-webui/open-webui
    tag: "v0.6.6"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080

  config:
    # Ollama connection (service name will be auto-generated)
    ollamaBaseUrl: ""  # Auto-configured to use openprodoc-ollama service

    # Vector database connection (pgvector)
    vectorDb:
      enabled: true
      type: "pgvector"
      # Connection URL will be constructed from pgvector config

    # Enable RAG features
    rag:
      enabled: true
      chunkSize: 1500
      chunkOverlap: 100

  persistence:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 5Gi  # For Open WebUI data

  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi

  podAnnotations: {}
  podSecurityContext:
    fsGroup: 1000
    runAsNonRoot: true
    runAsUser: 1000

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false


# ========================================
# RAG CustomTask Init (post-install Job)
# Replaces the external watcher with native
# OpenProdoc event-driven document handling.
# ========================================
ragInit:
  enabled: true

  config:
    # Open WebUI admin account for RAG operations
    watcherEmail: "watcher@openprodoc.local"
    watcherPassword: "12345678"

