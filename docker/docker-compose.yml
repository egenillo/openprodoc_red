version: '3.8'

services:
  # ============================================
  # PostgreSQL Database (OpenProdoc data)
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: openprodoc-postgres
    environment:
      POSTGRES_DB: prodoc
      POSTGRES_USER: user1
      POSTGRES_PASSWORD: pass1
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
      # Performance tuning (matching helm postgresql chart)
      POSTGRES_HOST_AUTH_METHOD: md5
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=1GB
      - -c
      - effective_cache_size=3GB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - wal_buffers=16MB
      - -c
      - default_statistics_target=100
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - work_mem=5242kB
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - openprodoc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user1 -d prodoc"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # OpenProdoc Core Engine (Backend + Web UI)
  # Accessible at http://localhost:8081/ProdocWeb2/
  # ============================================
  core-engine:
    image: openprodoc/core-engine:latest
    container_name: openprodoc-core
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: prodoc
      DB_USER: user1
      DB_PASSWORD: pass1
      DB_JDBC_CLASS: org.postgresql.Driver
      DB_JDBC_URL_TEMPLATE: "jdbc:postgresql://{HOST}:{PORT}/{DATABASE}?autoCommit=false"
      JDBC_DRIVER_PATH: ./lib/postgresql-42.3.8.jar
      INSTALL_ON_STARTUP: "true"
      ROOT_PASSWORD: admin
      DEFAULT_LANG: EN
      TIMESTAMP_FORMAT: "dd/MM/yyyy HH:mm:ss"
      DATE_FORMAT: "dd/MM/yyyy"
      MAIN_KEY: "uthfytnbh84kflh06fhru"
      REPO_NAME: Reposit
      REPO_ENCRYPT: "False"
      REPO_URL: /storage/OPD/
      REPO_TYPE: FS
      # Task scheduler configuration (enables cron/event CustomTasks)
      TASK_CATEGORY: "*"
      TASK_SEARCH_FREQ: "60000"
      TASK_EXEC_FREQ: "30000"
    command:
      - sh
      - -c
      - |
        echo "=== Enabling task scheduler in Prodoc.properties ==="
        echo "PD.TaskCategory=$$TASK_CATEGORY" >> /opt/openprodoc/Prodoc.properties
        echo "PD.TaskSearchFreq=$$TASK_SEARCH_FREQ" >> /opt/openprodoc/Prodoc.properties
        echo "PD.TaskExecFreq=$$TASK_EXEC_FREQ" >> /opt/openprodoc/Prodoc.properties
        sed -i 's/TRACELEVEL=0/TRACELEVEL=2/' /opt/openprodoc/Prodoc.properties
        echo "Task scheduler enabled (search=$${TASK_SEARCH_FREQ}ms, exec=$${TASK_EXEC_FREQ}ms)"
        exec catalina.sh run
    volumes:
      - openprodoc-storage:/storage/OPD
    ports:
      - "8081:8080"
    networks:
      - openprodoc-network
    restart: unless-stopped

  # ============================================
  # pgvector - Vector Database for RAG
  # ============================================
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: openprodoc-pgvector
    environment:
      POSTGRES_DB: rag_vectors
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgvector-data:/var/lib/postgresql/data
      - ./init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql:ro
    networks:
      - openprodoc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag_vectors"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # Ollama - LLM and Embedding Engine
  # ============================================
  ollama:
    image: ollama/ollama:0.5.4
    container_name: openprodoc-ollama
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_KEEP_ALIVE: "24h"
      OLLAMA_NUM_PARALLEL: "4"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - openprodoc-network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ============================================
  # Ollama Model Puller (one-shot init container)
  # Pulls required models then exits
  # ============================================
  ollama-pull-models:
    image: curlimages/curl:latest
    container_name: openprodoc-model-puller
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - openprodoc-network
    entrypoint:
      - sh
      - -c
      - |
        echo "Waiting for Ollama API..."
        until curl -sf http://ollama:11434/ >/dev/null 2>&1; do
          sleep 2
        done

        echo "Pulling LLM model: llama3.1:latest"
        curl -sf http://ollama:11434/api/pull -d '{"name":"llama3.1:latest"}' | head -1

        echo "Pulling embedding model: nomic-embed-text:latest"
        curl -sf http://ollama:11434/api/pull -d '{"name":"nomic-embed-text:latest"}' | head -1

        echo "Models pulled successfully!"
    restart: "no"

  # ============================================
  # Open WebUI - RAG Interface
  # Accessible at http://localhost:8080
  # ============================================
  openwebui:
    image: ghcr.io/open-webui/open-webui:v0.6.6
    container_name: openprodoc-openwebui
    depends_on:
      ollama:
        condition: service_healthy
      pgvector:
        condition: service_healthy
    environment:
      # Ollama connection
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_API_BASE_URL: "http://ollama:11434"
      # Vector database
      VECTOR_DB: "pgvector"
      PGVECTOR_DB_URL: "postgresql://rag_user:rag_password@pgvector:5432/rag_vectors"
      # RAG configuration
      RAG_EMBEDDING_MODEL: "nomic-embed-text:latest"
      RAG_EMBEDDING_ENGINE: "ollama"
      USE_EMBEDDING_MODEL_DOCKER: ""
      CHUNK_SIZE: "1500"
      CHUNK_OVERLAP: "100"
      # WebUI settings
      WEBUI_NAME: "OpenProdoc RAG Assistant"
      WEBUI_SECRET_KEY: "openprodoc-secret-key-change-in-production"
      ENABLE_RAG_WEB_SEARCH: "false"
      ENABLE_IMAGE_GENERATION: "false"
      # Signup/user config (allow rag-init to register the watcher admin)
      ENABLE_SIGNUP: "true"
      DEFAULT_USER_ROLE: "admin"
      # SCIM for group management
      SCIM_ENABLED: "true"
      SCIM_TOKEN: "openprodoc-scim-token-change-in-production"
    volumes:
      - openwebui-data:/app/backend/data
    ports:
      - "8082:8080"
    networks:
      - openprodoc-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ============================================
  # RAG CustomTask Init (one-shot)
  # Uploads JAR, creates event/cron task definitions,
  # and provisions the watcher admin account in Open WebUI.
  # Replaces the external watcher container for doc/folder events.
  # ============================================
  rag-init:
    image: postgres:16-alpine
    container_name: openprodoc-rag-init
    depends_on:
      core-engine:
        condition: service_started
      openwebui:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      OPENPRODOC_URL: "http://core-engine:8080"
      OPENWEBUI_URL: "http://openwebui:8080"
      OPENWEBUI_ADMIN_EMAIL: "watcher@openprodoc.local"
      OPENWEBUI_ADMIN_PASSWORD: "12345678"
      OPD_ROOT_USER: "root"
      OPD_ROOT_PASSWORD: "admin"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "prodoc"
      POSTGRES_USER: "user1"
      POSTGRES_PASSWORD: "pass1"
      JAR_PATH: "/jar/openprodoc-ragtask.jar"
      SYNC_INTERVAL_MINS: "1"
    volumes:
      - ./rag-init.sh:/rag-init.sh:ro
      - ./openprodoc-ragtask.jar:/jar/openprodoc-ragtask.jar:ro
    entrypoint: ["sh", "/rag-init.sh"]
    networks:
      - openprodoc-network
    restart: "no"

volumes:
  postgres-data:
    driver: local
  openprodoc-storage:
    driver: local
  pgvector-data:
    driver: local
  ollama-data:
    driver: local
  openwebui-data:
    driver: local
networks:
  openprodoc-network:
    driver: bridge
