spring:
  application:
    name: prodoc-api

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    org.openprodoc: INFO