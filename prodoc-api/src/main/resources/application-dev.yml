# Development Profile Configuration
spring:
  profiles: dev
  
  # Development database (local PostgreSQL)
  datasource:
    url: jdbc:postgresql://localhost:5432/openprodoc_dev
    username: openprodoc
    password: openprodoc
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

# OpenProdoc Development Settings
openprodoc:
  database:
    url: jdbc:postgresql://localhost:5432/openprodoc_dev
    username: openprodoc
    password: openprodoc
    max-pool-size: 5
    min-idle: 1
  
  storage:
    type: FILESYSTEM
    path: ./dev-storage/documents
  
  fulltext:
    index-path: ./dev-storage/lucene

# Enhanced logging for development
logging:
  level:
    root: INFO
    org.openprodoc: DEBUG
    prodoc: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type: TRACE
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %highlight(%-5level) %cyan(%logger{36}) - %msg%n"

# Enable all actuator endpoints for development
management:
  endpoints:
    web:
      exposure:
        include: "*"

# Swagger UI enabled
springdoc:
  swagger-ui:
    enabled: true
    display-request-duration: true
    display-operation-id: true

# Development server settings
server:
  port: 8080
  error:
    include-stacktrace: always
    include-exception: true