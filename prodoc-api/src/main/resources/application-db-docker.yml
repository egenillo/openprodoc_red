# Docker Database Configuration
# Profile: db-docker
spring:
  profiles:
    include: docker

# Docker PostgreSQL Configuration
openprodoc:
  database:
    # Docker container connection settings
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://postgres:5432/openprodoc}
    username: ${DB_USERNAME:openprodoc}
    password: ${DB_PASSWORD:openprodoc123}
    
    # Container-optimized connection pool
    max-pool-size: ${DB_MAX_POOL_SIZE:20}
    min-idle: ${DB_MIN_IDLE:3}
    connection-timeout: ${DB_CONNECTION_TIMEOUT:20000} # 20 seconds
    idle-timeout: ${DB_IDLE_TIMEOUT:400000} # 6.67 minutes
    max-lifetime: ${DB_MAX_LIFETIME:1200000} # 20 minutes
    leak-detection-threshold: ${DB_LEAK_DETECTION:60000} # 1 minute
    connection-test-query: "SELECT 1"
    
    # Docker optimizations
    cache-prep-stmts: true
    prep-stmt-cache-size: 250
    prep-stmt-cache-sql-limit: 2048
    use-server-prep-stmts: true
    rewrite-batched-statements: true
    maintain-time-stats: false
    log-unclosed-connections: false

  # Docker resilience settings (balanced)
  resilience:
    circuit-breaker-failure-threshold: 6
    circuit-breaker-slow-call-threshold: 10
    circuit-breaker-slow-call-duration: PT8S
    circuit-breaker-wait-duration-in-open-state: PT20S
    circuit-breaker-permitted-calls-in-half-open-state: 4
    circuit-breaker-sliding-window-size: 12
    
    retry-max-attempts: 3
    retry-wait-duration: PT1.5S
    retry-exponential-backoff-multiplier: 1.8
    time-limiter-timeout: PT8S

# Flyway Docker settings
spring:
  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false
    clean-disabled: true
    locations: classpath:db/migration
    sql-migration-suffixes: .sql
    
# Docker wait strategy for database
  datasource:
    hikari:
      # Docker-specific settings
      initialization-fail-timeout: 60000 # Wait up to 1 minute for DB
      
# JPA Docker settings
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL10Dialect
        default_schema: opd_core
        jdbc:
          batch_size: 30
          fetch_size: 75
        format_sql: false
        generate_statistics: false

# Docker health checks and monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true # Enable Kubernetes probes
  health:
    db:
      enabled: true
    diskspace:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    jdbc:
      enabled: true
    hikaricp:
      enabled: true

# Docker logging (structured for container logs)
logging:
  level:
    org.springframework.jdbc: INFO
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
    com.zaxxer.hikari: INFO
    io.github.resilience4j: INFO
    org.openprodoc.api.service.ResilientDatabaseService: INFO
    
# Docker-specific database settings
openprodoc-docker:
  database:
    # Container initialization
    wait-for-database: true
    max-wait-time-seconds: 60
    health-check-interval-seconds: 5
    
    # Container resource limits awareness
    respect-container-limits: true
    auto-adjust-pool-size: true
    
    # Docker network settings
    tcp-keep-alive: true
    socket-timeout: 30
    login-timeout: 15
    
    # Performance for containerized environment
    enable-query-cache: true
    query-cache-size: 1000
    
    # Docker volume persistence
    enable-wal-archiving: false # Usually handled by persistent volumes
    checkpoint-segments: 16
    
    # Connection parameters for containers
    connection-params:
      - "?tcpKeepAlive=true"
      - "&socketTimeout=30000" 
      - "&loginTimeout=15"
      - "&connectTimeout=10000"
      - "&cancelSignalTimeout=10"

# Environment-specific overrides for different container orchestrators
---
spring:
  profiles: db-docker-k8s
  
# Kubernetes-specific database settings
openprodoc:
  database:
    # Use service names for K8s
    url: ${DB_URL:jdbc:postgresql://postgres-service:5432/openprodoc}
    
    # K8s resource-aware settings
    max-pool-size: ${DB_MAX_POOL_SIZE:25}
    min-idle: ${DB_MIN_IDLE:5}

---
spring:
  profiles: db-docker-compose
  
# Docker Compose specific settings
openprodoc:
  database:
    # Use compose service names
    url: ${DB_URL:jdbc:postgresql://postgres:5432/openprodoc}
    
    # Compose-specific settings
    max-pool-size: ${DB_MAX_POOL_SIZE:15}
    min-idle: ${DB_MIN_IDLE:2}