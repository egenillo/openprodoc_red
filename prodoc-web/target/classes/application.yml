spring:
  application:
    name: openprodoc-web
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  
  # Thymeleaf configuration
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false
    check-template-location: true
  
  # Web MVC configuration
  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp
    static-path-pattern: /static/**
  
  # Resources configuration
  web:
    resources:
      static-locations: classpath:/static/,classpath:/public/,file:src/main/webapp/
      cache-period: 3600

# Server configuration  
server:
  port: ${SERVER_PORT:8090}
  servlet:
    context-path: /web
    session:
      timeout: 30m
  compression:
    enabled: true

# Integration with prodoc-api (Kubernetes service communication)
openprodoc:
  api:
    base-url: ${API_BASE_URL:http://prodoc-api:8080/api}
    timeout: ${API_TIMEOUT:30000}
    
# Security configuration
security:
  session:
    timeout: 1800 # 30 minutes
  csrf:
    enabled: false # Disabled for development

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    root: INFO
    org.openprodoc.web: DEBUG
    org.springframework.web: DEBUG
    org.thymeleaf: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %highlight(%-5level) %cyan(%logger{36}) - %msg%n"