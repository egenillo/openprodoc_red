<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - OpenProdoc'">Documents - OpenProdoc</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}">
    <link rel="stylesheet" type="text/css" th:href="@{/css/documents.css}">
</head>
<body>
    <!-- Include header -->
    <header class="main-header">
        <div class="header-left">
            <img th:src="@{/img/logo.png}" alt="OpenProdoc" class="logo-small">
            <h1>OpenProdoc</h1>
        </div>
        <div class="header-right">
            <span class="welcome-text">Welcome, <strong th:text="${username}">User</strong></span>
            <a th:href="@{/main}" class="btn btn-secondary">Main</a>
            <a th:href="@{/logout}" class="btn btn-logout">Logout</a>
        </div>
    </header>
    
    <div class="main-container">
        <nav class="sidebar">
            <ul class="nav-menu">
                <li><a th:href="@{/documents}" class="active">Documents</a></li>
                <li><a th:href="@{/folders}">Folders</a></li>
                <li><a th:href="@{/search}">Search</a></li>
                <li><a th:href="@{/reports}">Reports</a></li>
            </ul>
        </nav>
        
        <main class="content-area">
            <div class="content-header">
                <h2>Document Management</h2>
                <div class="content-actions">
                    <button class="btn btn-primary" onclick="uploadDocument()">Upload Document</button>
                    <button class="btn btn-secondary" onclick="refreshDocuments()">Refresh</button>
                </div>
            </div>
            
            <div class="content-body">
                <!-- Error message -->
                <div th:if="${error}" class="alert alert-error">
                    <span th:text="${error}">Error message</span>
                </div>
                
                <!-- Documents table -->
                <div th:if="${success}" class="documents-container">
                    <table class="documents-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Type</th>
                                <th>Size</th>
                                <th>Modified</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="documents-tbody">
                            <!-- Documents will be populated by JavaScript -->
                        </tbody>
                    </table>
                    
                    <div class="pagination">
                        <button class="btn btn-sm" onclick="previousPage()">Previous</button>
                        <span id="pagination-info">Page 1</span>
                        <button class="btn btn-sm" onclick="nextPage()">Next</button>
                    </div>
                </div>
                
                <!-- Loading state -->
                <div th:unless="${success}" class="loading-container">
                    <p>Loading documents...</p>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Upload Modal -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeUploadModal()">&times;</span>
            <h3>Upload Document</h3>
            <form id="uploadForm">
                <div class="form-group">
                    <label for="fileInput">Select File:</label>
                    <input type="file" id="fileInput" name="file" required>
                </div>
                <div class="form-group">
                    <label for="folderSelect">Folder:</label>
                    <select id="folderSelect" name="folderId">
                        <option value="">Root</option>
                        <!-- Folders will be populated dynamically -->
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Upload</button>
                    <button type="button" class="btn btn-secondary" onclick="closeUploadModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>
    
    <script th:inline="javascript">
        /*<![CDATA[*/
        var documentsData = /*[[${documentsData}]]*/ '{}';
        /*]]>*/
        
        document.addEventListener('DOMContentLoaded', function() {
            loadDocuments();
        });
        
        function loadDocuments() {
            try {
                if (documentsData && documentsData !== '{}') {
                    var data = JSON.parse(documentsData);
                    displayDocuments(data);
                }
            } catch (e) {
                console.error('Error parsing documents data:', e);
            }
        }
        
        function displayDocuments(documents) {
            var tbody = document.getElementById('documents-tbody');
            tbody.innerHTML = '';
            
            if (documents && documents.length > 0) {
                documents.forEach(function(doc) {
                    var row = tbody.insertRow();
                    row.innerHTML = `
                        <td>${doc.name || 'Unknown'}</td>
                        <td>${doc.type || 'Document'}</td>
                        <td>${doc.size || '-'}</td>
                        <td>${doc.modified || '-'}</td>
                        <td>
                            <button class="btn btn-sm" onclick="viewDocument('${doc.id}')">View</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteDocument('${doc.id}')">Delete</button>
                        </td>
                    `;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="5">No documents found</td></tr>';
            }
        }
        
        function uploadDocument() {
            document.getElementById('uploadModal').style.display = 'block';
        }
        
        function closeUploadModal() {
            document.getElementById('uploadModal').style.display = 'none';
        }
        
        function viewDocument(id) {
            window.location.href = '/web/documents/' + id;
        }
        
        function deleteDocument(id) {
            if (confirm('Are you sure you want to delete this document?')) {
                // TODO: Implement delete functionality
                console.log('Delete document:', id);
            }
        }
        
        function refreshDocuments() {
            window.location.reload();
        }
        
        function previousPage() {
            // TODO: Implement pagination
            console.log('Previous page');
        }
        
        function nextPage() {
            // TODO: Implement pagination
            console.log('Next page');
        }
    </script>
</body>
</html>
